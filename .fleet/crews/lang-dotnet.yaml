  - crates/apex-lang/src/csharp.rs
  - crates/apex-index/src/csharp.rs
  - crates/apex-synth/src/xunit.rs
  - crates/apex-concolic/src/csharp_conditions.rs
  - crates/apex-fuzz/src/harness/csharp.rs
  - crates/apex-reach/src/extractors/csharp.rs

tech_stack:
  - Rust
  - C#
  - dotnet
  - coverlet
  - xUnit

