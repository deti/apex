schema_version: 1
name: exploration
domain: "Dynamic path exploration — fuzzing engine, symbolic/concolic execution, constraint solving, coverage-guided search"

paths:
  - crates/apex-fuzz/**
  - crates/apex-symbolic/**
  - crates/apex-concolic/**
  - fuzz/**

tech_stack:
  - Rust
  - optional libafl
  - optional z3
  - SMT-LIB
  - grammar-based mutation

