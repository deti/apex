schema_version: 1
name: apex
domain: "APEX coverage tool — Rust workspace with 16 crates spanning static analysis, fuzzing, concolic execution, RPC, and CLI"

crews:
  # Layer crews (shared infrastructure)
  - foundation
  - security-detect
  - exploration
  - runtime
  - intelligence
  - platform
  - mcp-integration
  - agent-ops
  # Language crews (end-to-end per-language pipelines)
  - lang-python
  - lang-js
  - lang-rust
  - lang-go
  - lang-jvm
  - lang-c-cpp
  - lang-dotnet
  - lang-swift
  - lang-ruby

specialists:
  - agent: "feature-dev:code-architect"
    phase: analyze
    when: "before multi-crate implementation — analyze impact across crate boundaries"
  - agent: "feature-dev:code-explorer"
    phase: analyze
    when: "deep crate analysis — trace trait impls, dependency chains"
  - agent: "feature-dev:code-reviewer"
    phase: verify
    when: "after implementation — find bugs, logic errors, quality issues"
  - agent: "mycelium-core:rust-engineer"
    phase: verify
    when: "Rust-specific review — ownership, async, unsafe, lifetime issues"
  - agent: "mycelium-core:security-engineer"
    phase: verify
    when: "sandbox, taint analysis, or auth changes"

verification:
  build: "cargo check --workspace"
  test: "cargo test --workspace"
  lint: "cargo clippy --workspace -- -D warnings"
  changelog: "git diff --name-only HEAD~1 | grep -q CHANGELOG.md"

plan_dir: ".fleet/plans"

dependency_order:
  wave1: [foundation]
  wave2: [security-detect, exploration, runtime]
  wave3: [intelligence, mcp-integration]
  wave4: [lang-python, lang-js, lang-rust, lang-go, lang-jvm, lang-c-cpp, lang-dotnet, lang-swift, lang-ruby]
  wave5: [platform, agent-ops]
