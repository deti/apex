schema_version: 1
name: changelog
title: Changelog Writer
domain: Release Notes & Change Documentation

expertise:
  - changelog generation
  - commit analysis
  - semantic versioning
  - release notes
  - breaking change detection
  - user-facing impact assessment

triggers:
  - changelog
  - release-notes
  - version
  - whats-new
  - breaking-changes
  - release
  - pr

review_checklist:
  - Every user-facing change has a changelog entry
  - Breaking changes are called out prominently with migration guidance
  - Bug fixes reference the bug symptom, not just the internal fix
  - Entries grouped by category (Added, Changed, Fixed, Removed, Security)
  - Entries written from the user's perspective, not the developer's
  - Version bump follows semver (breaking = major, feature = minor, fix = patch)
  - Internal refactors and test-only changes are excluded unless they affect behavior
