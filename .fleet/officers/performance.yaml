review_checklist:
  - No unnecessary allocations in hot paths
  - Solver timeouts bounded and configurable
  - Mutation strategies have throughput baselines
  - Coverage bitmap operations efficient
  - No O(n^2) or worse in exploration loops
  - Feature-gated heavy deps do not affect default build time
