name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: sudo apt-get install -y protobuf-compiler
      - run: cargo check --workspace

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: sudo apt-get install -y protobuf-compiler
      - run: cargo test --workspace

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: sudo apt-get install -y protobuf-compiler
      - run: cargo clippy --workspace -- -D warnings

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check

  changelog:
    name: Changelog
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check CHANGELOG.md was updated
        run: |
          if git diff --name-only origin/main...HEAD | grep -q '^CHANGELOG.md$'; then
            echo "CHANGELOG.md updated"
          else
            echo "::error::PR must include a CHANGELOG.md entry under [Unreleased]"
            echo ""
            echo "Add your changes under the appropriate section in CHANGELOG.md:"
            echo "  ### Added    — new features"
            echo "  ### Changed  — changes to existing functionality"
            echo "  ### Fixed    — bug fixes"
            echo "  ### Removed  — removed features"
            echo "  ### Security — security improvements"
            exit 1
          fi

  apex-audit:
    name: APEX Self-Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: sudo apt-get install -y protobuf-compiler
      - name: Build APEX
        run: cargo build --release
      - name: Run APEX audit on itself
        run: |
          ./target/release/apex audit --target . --lang rust --output-format json > /tmp/apex-audit.json
          echo "APEX audit completed"
      - name: Check for new high-severity findings
        run: |
          HIGH_COUNT=$(python3 -c "
          import json
          data = json.load(open('/tmp/apex-audit.json'))
          findings = data.get('findings', [])
          highs = [f for f in findings if f.get('severity') == 'high']
          print(len(highs))
          ")
          echo "High-severity findings: $HIGH_COUNT"
          # Baseline: current known highs (path-normalize FPs in CLI)
          # Allow up to this baseline, fail on new ones
          if [ "$HIGH_COUNT" -gt 100 ]; then
            echo "::error::APEX audit found $HIGH_COUNT high findings (baseline: ~94). New high-severity issues introduced."
            exit 1
          fi
      - name: Upload audit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: apex-audit-results
          path: /tmp/apex-audit.json

  apex-coverage:
    name: APEX Coverage Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - run: sudo apt-get install -y protobuf-compiler
      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov
      - name: Run coverage
        run: |
          # Exclude apex-rpc (needs protoc at test time) to avoid build failures
          cargo llvm-cov --json \
            -p apex-core -p apex-coverage -p apex-detect -p apex-fuzz \
            -p apex-concolic -p apex-synth -p apex-index -p apex-lang \
            -p apex-cpg -p apex-agent -p apex-mir -p apex-symbolic \
            -p apex-instrument \
            > /tmp/coverage.json 2>&1 || true
      - name: Check coverage threshold
        run: |
          COVERAGE=$(python3 -c "
          import json
          try:
              data = json.load(open('/tmp/coverage.json'))
              pct = data.get('data', [{}])[0].get('totals', {}).get('lines', {}).get('percent', 0)
              print(f'{pct:.1f}')
          except:
              print('0.0')
          ")
          echo "Line coverage: ${COVERAGE}%"
          if [ "$COVERAGE" = "0.0" ]; then
            echo "::warning::Coverage data unavailable (cargo llvm-cov may have failed)"
            echo "Skipping coverage gate — run locally to verify"
            exit 0
          fi
          # Fail if coverage drops below 80%
          if python3 -c "exit(0 if float('$COVERAGE') >= 80.0 else 1)"; then
            echo "Coverage gate passed: ${COVERAGE}% >= 80%"
          else
            echo "::error::Coverage dropped to ${COVERAGE}% (minimum: 80%)"
            exit 1
          fi

  dist-npm:
    name: Validate npm package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Validate package.json
        working-directory: npm
        run: |
          node -e "const p = require('./package.json'); if (!p.name || !p.version || !p.bin) { process.exit(1); }"
          node -e "require('./install.js'); process.exit(0);" 2>/dev/null || true
      - name: Check version sync
        run: |
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          NPM_VERSION=$(node -p "require('./npm/package.json').version")
          if [ "$CARGO_VERSION" != "$NPM_VERSION" ]; then
            echo "::error::npm version ($NPM_VERSION) != Cargo version ($CARGO_VERSION)"
            exit 1
          fi

  dist-python:
    name: Validate Python package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate package
        working-directory: python
        run: |
          pip install build
          python -m build --sdist
      - name: Check version sync
        run: |
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          PY_VERSION=$(python -c "import tomllib; print(tomllib.load(open('python/pyproject.toml','rb'))['project']['version'])")
          if [ "$CARGO_VERSION" != "$PY_VERSION" ]; then
            echo "::error::Python version ($PY_VERSION) != Cargo version ($CARGO_VERSION)"
            exit 1
          fi

  dist-homebrew:
    name: Validate Homebrew formula
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check formula syntax
        run: ruby -c HomebrewFormula/apex.rb

  dist-nix:
    name: Validate Nix flake
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v27
      - run: nix flake check --no-build

  dist-install-script:
    name: Validate install script
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Shellcheck
        run: |
          sudo apt-get install -y shellcheck
          shellcheck install.sh
