<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 520">
  <style>
    /* Reveal keyframes — 18s total, play once, hold final state */
    @keyframes r1  { 0%,5%   { opacity:0 } 6%   { opacity:1 } }
    @keyframes r2  { 0%,12%  { opacity:0 } 14%  { opacity:1 } }
    @keyframes r3  { 0%,18%  { opacity:0 } 20%  { opacity:1 } }
    @keyframes r4  { 0%,24%  { opacity:0 } 26%  { opacity:1 } }
    @keyframes r5  { 0%,30%  { opacity:0 } 32%  { opacity:1 } }
    @keyframes r6  { 0%,36%  { opacity:0 } 38%  { opacity:1 } }
    @keyframes r7  { 0%,42%  { opacity:0 } 44%  { opacity:1 } }
    @keyframes r8  { 0%,48%  { opacity:0 } 50%  { opacity:1 } }
    @keyframes blink { 0%,49% { opacity:1 } 50%,100% { opacity:0 } }

    .t { font-family: 'SF Mono','Cascadia Code','Fira Code','JetBrains Mono',Menlo,monospace; font-size: 13px }
    .r1 { opacity:0; animation: r1 18s 1 forwards }
    .r2 { opacity:0; animation: r2 18s 1 forwards }
    .r3 { opacity:0; animation: r3 18s 1 forwards }
    .r4 { opacity:0; animation: r4 18s 1 forwards }
    .r5 { opacity:0; animation: r5 18s 1 forwards }
    .r6 { opacity:0; animation: r6 18s 1 forwards }
    .r7 { opacity:0; animation: r7 18s 1 forwards }
    .r8 { opacity:0; animation: r8 18s 1 forwards }
    .cur { animation: blink 1s step-end infinite }

    .pr { fill:#7ec699 } .cm { fill:#cdd6f4 } .dm { fill:#6c7086 }
    .cy { fill:#89dceb } .yl { fill:#f9e2af } .rd { fill:#f38ba8 }
    .gn { fill:#a6e3a1 } .bl { fill:#89b4fa } .mg { fill:#cba6f7 }
    .pc { fill:#fab387 } .wh { fill:#cdd6f4 } .b { font-weight:700 }
    .s2 { fill:#585b70 }
  </style>

  <!-- Terminal chrome -->
  <rect width="780" height="520" rx="10" fill="#1e1e2e"/>
  <rect width="780" height="36" rx="10" fill="#313244"/>
  <rect y="26" width="780" height="10" fill="#313244"/>
  <circle cx="20" cy="18" r="6" fill="#f38ba8"/>
  <circle cx="40" cy="18" r="6" fill="#f9e2af"/>
  <circle cx="60" cy="18" r="6" fill="#a6e3a1"/>
  <text x="390" y="22" text-anchor="middle" class="t dm" font-size="12">apex audit — real-world validation</text>

  <g transform="translate(18, 56)" class="t">

    <!-- COMMAND -->
    <text y="0" class="pr">$</text>
    <text x="16" y="0" class="cm">apex audit --target kubernetes --lang go</text>

    <!-- APEX HEADER -->
    <g class="r1">
      <text y="32" class="dm">╭───────────────────────────────────────────────────────────╮</text>
      <text y="50" class="dm">│</text>
      <text x="16" y="50" class="cy b">APEX v0.2.1</text>
      <text x="110" y="50" class="dm">— Autonomous Path EXploration</text>
      <text x="460" y="50" class="dm">│</text>
      <text y="68" class="dm">│</text>
      <text x="16" y="68" class="dm">Scanning 10 repos · 11 languages · Fleet parallel</text>
      <text x="460" y="68" class="dm">│</text>
      <text y="86" class="dm">╰───────────────────────────────────────────────────────────╯</text>
    </g>

    <!-- TRUE POSITIVE FINDINGS -->
    <g class="r2">
      <text y="118" class="gn b">  ✓ CRIT</text>
      <text x="80" y="118" class="pc">Kubernetes</text>
      <text x="170" y="118" class="dm">testserver.go:60</text>
      <rect x="330" y="106" width="68" height="17" rx="3" fill="#45475a"/>
      <text x="336" y="118" class="rd b" font-size="11">CWE-798</text>
      <text x="406" y="118" class="gn">Hardcoded EC private key</text>
    </g>

    <g class="r3">
      <text y="142" class="gn b">  ✓ CRIT</text>
      <text x="80" y="142" class="pc">Vapor</text>
      <text x="170" y="142" class="dm">configure.swift:49</text>
      <rect x="330" y="130" width="68" height="17" rx="3" fill="#45475a"/>
      <text x="336" y="142" class="rd b" font-size="11">CWE-798</text>
      <text x="406" y="142" class="gn">PEM private key in source</text>
    </g>

    <g class="r4">
      <text y="166" class="gn b">  ✓ HIGH</text>
      <text x="80" y="166" class="pc">CPython</text>
      <text x="170" y="166" class="dm">fileobject.c:269</text>
      <rect x="330" y="154" width="68" height="17" rx="3" fill="#45475a"/>
      <text x="336" y="166" class="yl b" font-size="11">CWE-242</text>
      <text x="406" y="166" class="gn">gets() — banned function</text>
    </g>

    <g class="r5">
      <text y="190" class="gn b">  ✓ HIGH</text>
      <text x="80" y="190" class="pc">eslint</text>
      <text x="170" y="190" class="dm">dependencies</text>
      <rect x="330" y="178" width="74" height="17" rx="3" fill="#45475a"/>
      <text x="336" y="190" class="yl b" font-size="11">CWE-1395</text>
      <text x="412" y="190" class="gn">Known CVEs in deps</text>
    </g>

    <g class="r6">
      <text y="214" class="gn b">  ✓ MED</text>
      <text x="80" y="214" class="pc">Spring Boot</text>
      <text x="170" y="214" class="dm">ObjectMapper config</text>
      <rect x="330" y="202" width="68" height="17" rx="3" fill="#45475a"/>
      <text x="336" y="214" class="bl b" font-size="11">CWE-502</text>
      <text x="406" y="214" class="gn">Unsafe deserialization</text>
    </g>

    <!-- SUMMARY CARD — THE HERO FRAME -->
    <g class="r7">
      <text y="248" class="dm">  ══════════════════════════════════════════════════════════</text>

      <rect x="8" y="262" width="720" height="120" rx="6" fill="#181825" stroke="#45475a" stroke-width="1"/>

      <text x="28" y="286" class="mg b" font-size="15">Results</text>

      <text x="28" y="312" class="wh">Repos scanned:</text>
      <text x="160" y="312" class="gn b">10</text>
      <text x="220" y="312" class="wh">Languages:</text>
      <text x="310" y="312" class="gn b">11</text>
      <text x="370" y="312" class="wh">Findings:</text>
      <text x="450" y="312" class="gn b">12,656</text>
      <text x="530" y="312" class="wh">Crashes:</text>
      <text x="600" y="312" class="gn b">0</text>

      <text x="28" y="340" class="wh">FP rate:</text>
      <text x="100" y="340" class="gn b" font-size="16">~30%</text>
      <text x="175" y="340" class="dm">(industry avg: 60-90%)</text>

      <text x="28" y="366" class="wh">Performance:</text>
      <text x="130" y="366" class="cy">Spring Boot 2.5s</text>
      <text x="290" y="366" class="dm">·</text>
      <text x="310" y="366" class="cy">Linux kernel 4 min</text>
    </g>

    <g class="r8">
      <text y="406" class="dm">  Repos: Linux · CPython · TypeScript · ripgrep · Spring Boot</text>
      <text y="424" class="dm">         Kubernetes · .NET · Vapor · Rails · ktor</text>

      <text y="454" class="pr">  $</text>
      <rect x="34" y="443" width="8" height="15" fill="#cdd6f4" class="cur"/>
    </g>

  </g>
</svg>
