// --- Force Layout (grid-seeded + edge-only forces for large graphs) ---
const N = DATA.nodes.length;
const SPREAD = Math.max(800, Math.sqrt(N) * 40);
const cols = Math.ceil(Math.sqrt(N));
const nodes = DATA.nodes.map((n, i) => ({
  ...n,
  x: ((i % cols) - cols/2) * (SPREAD / cols) + (Math.random() - 0.5) * 20,
  y: (Math.floor(i / cols) - cols/2) * (SPREAD / cols) + (Math.random() - 0.5) * 20,
  vx: 0, vy: 0,
}));
const nodeIdx = new Map();
nodes.forEach((n, i) => nodeIdx.set(n.id, i));

const edges = validEdges.map(e => ({
  source: nodeIdx.get(e.source),
  target: nodeIdx.get(e.target),
  type: e.type,
})).filter(e => e.source !== undefined && e.target !== undefined);

// Build adjacency for neighbor-only repulsion
const adj = new Array(N);
for (let i = 0; i < N; i++) adj[i] = new Set();
edges.forEach(e => { adj[e.source].add(e.target); adj[e.target].add(e.source); });

// Group orphans in outer ring
nodes.forEach((n, i) => {
  if (!connectedIds.has(n.id)) {
    const angle = (i / N) * Math.PI * 2;
    const r = SPREAD * 0.6 + Math.random() * 50;
    n.x = Math.cos(angle) * r;
    n.y = Math.sin(angle) * r;
  }
});

function simulate(iterations) {
  const isLarge = N > 500;
  for (let iter = 0; iter < iterations; iter++) {
    const alpha = Math.max(0.01, 1 - iter / iterations);

    if (!isLarge) {
      // O(n^2) repulsion for small graphs
      for (let i = 0; i < N; i++) {
        for (let j = i + 1; j < N; j++) {
          const dx = nodes[j].x - nodes[i].x;
          const dy = nodes[j].y - nodes[i].y;
          const dist = Math.sqrt(dx*dx + dy*dy) + 1;
          const force = 800 / (dist * dist);
          const fx = (dx / dist) * force * alpha;
          const fy = (dy / dist) * force * alpha;
          nodes[i].vx -= fx; nodes[i].vy -= fy;
          nodes[j].vx += fx; nodes[j].vy += fy;
        }
      }
    } else {
      // Neighbor-only repulsion for large graphs (O(E) per iteration)
      edges.forEach(e => {
        const s = nodes[e.source], t = nodes[e.target];
        const dx = t.x - s.x, dy = t.y - s.y;
        const dist = Math.sqrt(dx*dx + dy*dy) + 1;
        const repForce = 3000 / (dist * dist);
        const fx = (dx / dist) * repForce * alpha;
        const fy = (dy / dist) * repForce * alpha;
        s.vx -= fx; s.vy -= fy;
        t.vx += fx; t.vy += fy;
      });
    }

    // Spring attraction along edges
    edges.forEach(e => {
      const s = nodes[e.source], t = nodes[e.target];
      const dx = t.x - s.x, dy = t.y - s.y;
      const dist = Math.sqrt(dx*dx + dy*dy) + 1;
      const idealDist = isLarge ? 120 : 60;
      const springK = isLarge ? 0.01 : 0.04;
      const force = (dist - idealDist) * springK * alpha;
      const fx = (dx / dist) * force;
      const fy = (dy / dist) * force;
      s.vx += fx; s.vy += fy;
      t.vx -= fx; t.vy -= fy;
    });

    // Centering force
    nodes.forEach(n => {
      if (connectedIds.has(n.id)) {
        n.vx -= n.x * 0.001 * alpha;
        n.vy -= n.y * 0.001 * alpha;
      }
    });

    // Apply velocity with damping
    const damping = isLarge ? 0.5 : 0.6;
    nodes.forEach(n => {
      n.vx *= damping; n.vy *= damping;
      n.x += n.vx; n.y += n.vy;
    });
  }
}

simulate(N > 500 ? 150 : 300);

}

function nodeRadius(n) {
  if (!connectedIds.has(n.id)) return 2.5;
  // Scale by degree: base 3.5, grows with links, capped
  return 3.5 + Math.min(n.linkCount * 0.6, 12);
}

// --- Render ---
const edgeEls = [];
edges.forEach(e => {
  const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
  line.setAttribute('stroke', '#1e2a3a');
  line.setAttribute('stroke-width', '0.5');
  line.setAttribute('x1', nodes[e.source].x);
  line.setAttribute('y1', nodes[e.source].y);
  line.setAttribute('x2', nodes[e.target].x);
  line.setAttribute('y2', nodes[e.target].y);
  line._edge = e;
  gEdges.appendChild(line);
  edgeEls.push(line);
});

const nodeEls = [];
nodes.forEach((n, i) => {
  const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
  circle.setAttribute('cx', n.x);
  circle.setAttribute('cy', n.y);
  circle.setAttribute('r', nodeRadius(n));
  circle.setAttribute('fill', nodeColor(n));
  circle.setAttribute('stroke', 'none');
  circle.style.cursor = 'pointer';
  circle.style.transition = 'opacity 0.3s';
  circle._node = n;
  circle._idx = i;

  circle.addEventListener('mouseenter', () => {
    circle.setAttribute('r', nodeRadius(n) + 2);
    circle.setAttribute('stroke', '#fff');
    circle.setAttribute('stroke-width', '1');
    showTooltip(n, n.x, n.y);
  });
  circle.addEventListener('mouseleave', () => {
    circle.setAttribute('r', nodeRadius(n));
    circle.setAttribute('stroke', 'none');
    hideTooltip();
  });
  circle.addEventListener('click', (ev) => {
    ev.stopPropagation();
    selectNode(n);
  });

  gNodes.appendChild(circle);
  nodeEls.push(circle);

  // Labels for hubs
  if (n.isHub) {
    const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    text.setAttribute('x', n.x + nodeRadius(n) + 4);
    text.setAttribute('y', n.y + 3);
    text.setAttribute('fill', '#9ca3af');
    text.setAttribute('font-size', '5');
    text.setAttribute('font-family', 'SF Mono, Fira Code, monospace');
    text.textContent = n.title.slice(0, 35);
    gLabels.appendChild(text);
  }
});

// --- Tooltip ---
const tooltip = document.createElementNS('http://www.w3.org/2000/svg', 'g');
tooltip.style.display = 'none';
gMain.appendChild(tooltip);
const ttRect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
ttRect.setAttribute('fill', 'rgba(15,20,30,0.95)');
ttRect.setAttribute('stroke', '#2a3a4a');
ttRect.setAttribute('rx', '3');
tooltip.appendChild(ttRect);
const ttText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
ttText.setAttribute('fill', '#e5e7eb');
ttText.setAttribute('font-size', '5');
ttText.setAttribute('font-family', 'SF Mono, Fira Code, monospace');
tooltip.appendChild(ttText);

function showTooltip(n, x, y) {
  ttText.textContent = n.title.slice(0, 60);
  const bbox = { width: n.title.slice(0,60).length * 3, height: 8 };
  ttRect.setAttribute('x', x + 8);
  ttRect.setAttribute('y', y - 10);
  ttRect.setAttribute('width', bbox.width + 8);
  ttRect.setAttribute('height', bbox.height + 4);
  ttText.setAttribute('x', x + 12);
  ttText.setAttribute('y', y - 3);
  tooltip.style.display = '';
}
function hideTooltip() { tooltip.style.display = 'none'; }

// --- Selection / Detail ---
let selectedNode = null;
function selectNode(n) {
  selectedNode = n;
  const detail = document.getElementById('detail');
  detail.style.display = 'block';
  document.getElementById('d-title').textContent = n.title;
  document.getElementById('d-meta').innerHTML =
    '<b>Type:</b> ' + n.type + ' &nbsp; <b>Links:</b> ' + n.linkCount + ' &nbsp; <b>Cluster:</b> ' + (n.cluster >= 0 ? n.cluster + 1 : 'none') + '<br>' +
    '<b>Tags:</b> ' + n.tags.join(', ');

  // Find connected notes
  const linked = [];
  edges.forEach(e => {
    if (nodes[e.source].id === n.id) linked.push({ dir: '\u2192', node: nodes[e.target] });
    if (nodes[e.target].id === n.id) linked.push({ dir: '\u2190', node: nodes[e.source] });
  });

  const linksDiv = document.getElementById('d-links');
  if (linked.length) {
    linksDiv.innerHTML = '<b>Connected:</b><br>' + linked.map(l =>
      '<span onclick="focusNode(\'' + l.node.id + '\')">' + l.dir + ' ' + l.node.title.slice(0,55) + '</span>'
    ).join('<br>');
  } else {
    linksDiv.innerHTML = '<i style="color:#6b7280">No links (orphan)</i>';
  }

  // Highlight connected
  highlightNeighbors(n);
}

function highlightNeighbors(n) {
  const neighborIds = new Set([n.id]);
  edges.forEach(e => {
    if (nodes[e.source].id === n.id) neighborIds.add(nodes[e.target].id);
    if (nodes[e.target].id === n.id) neighborIds.add(nodes[e.source].id);
  });

  nodeEls.forEach(el => {
    const isNeighbor = neighborIds.has(el._node.id);
    el.style.opacity = isNeighbor ? '1' : '0.15';
  });
  edgeEls.forEach(el => {
    const isConn = neighborIds.has(nodes[el._edge.source].id) && neighborIds.has(nodes[el._edge.target].id);
    el.setAttribute('stroke', isConn ? '#5eead4' : '#0a0e17');
    el.setAttribute('stroke-width', isConn ? '1.5' : '0.3');
  });
}

function clearHighlight() {
  nodeEls.forEach(el => el.style.opacity = '1');
  edgeEls.forEach(el => { el.setAttribute('stroke', '#1e2a3a'); el.setAttribute('stroke-width', '0.5'); });
  document.getElementById('detail').style.display = 'none';
  selectedNode = null;
}

svg.addEventListener('click', clearHighlight);

window.focusNode = function(id) {
  const n = nodes.find(n => n.id === id);
  if (n) {
    transform.x = width/2 - n.x * transform.k;
    transform.y = height/2 - n.y * transform.k;
    applyTransform();
    selectNode(n);
  }
};

// --- Tag filter ---
function updateVisibility() {
  nodeEls.forEach(el => {
    if (!activeTag) { el.style.opacity = '1'; return; }
    el.style.opacity = el._node.tags.includes(activeTag) ? '1' : '0.08';
  });
  edgeEls.forEach(el => {
    if (!activeTag) { el.setAttribute('stroke', '#1e2a3a'); return; }
    const s = nodes[el._edge.source], t = nodes[el._edge.target];
    const visible = s.tags.includes(activeTag) && t.tags.includes(activeTag);
    el.setAttribute('stroke', visible ? '#1e2a3a' : '#060810');
  });
}

// --- Search ---
const searchInput = document.getElementById('search');
searchInput.addEventListener('input', () => {
  const q = searchInput.value.toLowerCase().trim();
  if (!q) { nodeEls.forEach(el => el.style.opacity = '1'); return; }
  nodeEls.forEach(el => {
    const match = el._node.title.toLowerCase().includes(q) || el._node.tags.some(t => t.includes(q));
    el.style.opacity = match ? '1' : '0.08';
  });
});

// --- Zoom & Pan ---
function applyTransform() {
  gMain.setAttribute('transform', 'translate(' + transform.x + ',' + transform.y + ') scale(' + transform.k + ')');
}
applyTransform();

let dragging = false, dragStart = {};
svg.addEventListener('mousedown', (e) => {
  if (e.target.tagName === 'circle') return;
  dragging = true;
  dragStart = { x: e.clientX - transform.x, y: e.clientY - transform.y };
});
svg.addEventListener('mousemove', (e) => {
  if (!dragging) return;
  transform.x = e.clientX - dragStart.x;
  transform.y = e.clientY - dragStart.y;
  applyTransform();
});
svg.addEventListener('mouseup', () => dragging = false);
svg.addEventListener('mouseleave', () => dragging = false);

svg.addEventListener('wheel', (e) => {
  e.preventDefault();
  const scale = e.deltaY > 0 ? 0.9 : 1.1;
  const mx = e.clientX, my = e.clientY;
  transform.x = mx - (mx - transform.x) * scale;
  transform.y = my - (my - transform.y) * scale;
  transform.k *= scale;
  transform.k = Math.max(0.3, Math.min(8, transform.k));
  applyTransform();
}, { passive: false });
</script>
</body>
</html>
